name: blue_bird
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # For app icon generation
  flutter_launcher_icons: ^0.10.0

flutter:

  uses-material-design: true

  # In-game bird image asset
  assets:
    - assets/images/bird.png
    - assets/images/cloud.png
# App icon configuration
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/bird.png"